<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | Pole Electroplating &amp; Paintstrippers</title>
<meta name="description" content="Tell us how we did. Leave a review for Pole Electroplating & Paintstrippers, Christchurch.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body style="background:var(--char-900)">

<header class="nav scrolled">
  <a class="brand" href="index.html"><span class="brand-mark">P</span><span class="brand-name">Pole<small>Plating &amp; Stripping</small></span></a>
  <div class="nav-cta"><a class="btn btn--ghost" href="index.html">Back to Site</a></div>
</header>

<div class="review-wrap">
  <div class="review-card">
    <div class="brand-mark">P</div>
    <h1>How did we do?</h1>
    <p>Your feedback helps us keep the finish right. Tap a star to get started.</p>
    <div class="starpick" id="stars">
      <button data-v="1" aria-label="1 star">&#9733;</button>
      <button data-v="2" aria-label="2 stars">&#9733;</button>
      <button data-v="3" aria-label="3 stars">&#9733;</button>
      <button data-v="4" aria-label="4 stars">&#9733;</button>
      <button data-v="5" aria-label="5 stars">&#9733;</button>
    </div>
    <p class="review-hint">Tap the stars that match your experience</p>
  </div>
</div>

<script>
  // 1-3 stars -> private feedback. 4-5 stars -> Google review.
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER/review";
  var stars = document.querySelectorAll('#stars button');
  stars.forEach(function(btn){
    btn.addEventListener('mouseenter', function(){
      var v = +btn.dataset.v;
      stars.forEach(function(b){ b.classList.toggle('lit', +b.dataset.v <= v); });
    });
    btn.addEventListener('click', function(){
      var v = +btn.dataset.v;
      if(v >= 4){ window.location.href = GOOGLE_REVIEW_URL; }
      else { window.location.href = 'private.html?rating=' + v; }
    });
  });
  document.getElementById('stars').addEventListener('mouseleave', function(){
    stars.forEach(function(b){ b.classList.remove('lit'); });
  });
</script>
</body>
</html>
